name: Tests

on:
  push:
  pull_request:
    branches:
      - develop
      - master

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[test]"

      - name: Run tests with pytest
        run: |
          pytest --cov=valifold

      - name: Lint with ruff
        run: |
          ruff check

      - name: Type check with mypy
        run: |
          mypy src/

      - name: Get Python root
        run: |
          echo "PACKAGES_ROOT=$(python -c 'import sys; print(sys.prefix)')" >> $GITHUB_ENV

      - name: Upload coverage to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          base-path: ${{ env.PACKAGES_ROOT }}