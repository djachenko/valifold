name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump type
        required: false
        default: minor
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.RELEASE_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build bump-my-version

      - name: Configure git
        run: |
          git config user.name "bump-my-version"
          git config user.email "bump-my-version@users.noreply.github.com"

      - name: Bump version (with commit and tag)
        run: |
          bump-my-version bump ${{ inputs.bump }}

      - name: Push
        run: |
          git push --follow-tags

      - name: Build
        run: python -m build

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          verbose: true

      - name: Smoke test
        run: |
          VERSION=$(bump-my-version show current_version)
          pip install \
            --index-url https://test.pypi.org/simple/ \
            valifold==$VERSION
          python -c "import valifold; print('OK')"

      - name: Create GitHub Release
        run: |
          VERSION=$(bump-my-version show current_version)
          gh release create "v$VERSION" dist/* \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}

      # Когда будешь готов выходить на PyPI:
      # 1. Настрой Trusted Publisher на pypi.org (аналогично TestPyPI)
      # 2. Раскомментируй шаги ниже
