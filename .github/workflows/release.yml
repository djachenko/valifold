name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump type
        required: false
        default: minor
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  # ── 1. Бампим версию локально, публикуем на TestPyPI, smoke test ───────────
  test-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      version: ${{ steps.bump.outputs.version }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: develop
          token: ${{ secrets.RELEASE_TOKEN }}
          fetch-depth: 0

      - name: Check develop has changes over master
        run: |
          git fetch origin master
          DIFF=$(git log origin/master..HEAD --oneline)
          if [ -z "$DIFF" ]; then
            echo "develop не опережает master — нечего релизить"
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build bump-my-version

      - name: Bump version (no commit)
        id: bump
        run: |
          bump-my-version bump ${{ inputs.bump }} --no-commit --no-tag
          VERSION=$(bump-my-version show current_version)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build
        run: |
          python -m build

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

      - name: Smoke test
        run: |
          pip install \
            --index-url https://test.pypi.org/simple/ \
            valifold==${{ steps.bump.outputs.version }}
          python -c "import valifold; print('OK')"

  # ── 2. Мержим в master, бампим с коммитом, создаём GitHub Release ──────────
  merge-and-release:
    needs: test-and-publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v6
        with:
          ref: master
          token: ${{ secrets.RELEASE_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build bump-my-version

      - name: Configure git
        run: |
          git config user.name "bump-my-version"
          git config user.email "bump-my-version@users.noreply.github.com"

      - name: Merge develop into master
        run: |
          git fetch origin develop
          git merge origin/develop --no-edit

      - name: Bump version (with commit and tag)
        run: |
          bump-my-version bump ${{ inputs.bump }}

      - name: Push master
        run: |
          git push --follow-tags

      - name: Build
        run: |
          python -m build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.test-and-publish.outputs.version }}
          generate_release_notes: true
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}

      # Когда будешь готов выходить на PyPI:
      # 1. Настрой Trusted Publisher на pypi.org (аналогично TestPyPI)
      # 2. Раскомментируй шаги ниже
      #
      # - name: Publish to PyPI
      #   uses: pypa/gh-action-pypi-publish@release/v1
      #
      # - name: Smoke test PyPI
      #   run: |
      #     pip install valifold==${{ needs.test-and-publish.outputs.version }}
      #     python -c "import valifold; print('OK')"

  # ── 3. Актуализируем develop ───────────────────────────────────────────────
  sync-develop:
    needs: merge-and-release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          ref: develop
          token: ${{ secrets.RELEASE_TOKEN }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "bump-my-version"
          git config user.email "bump-my-version@users.noreply.github.com"

      - name: Merge master back into develop
        run: |
          git fetch origin master
          git merge origin/master --no-edit
          git push